<!DOCTYPE html>
<html>
<head>
<title>My First Web Page</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #FAFAFA;
  margin: 0;
  text-align: center;
}

.container {
  margin: 60px auto;
  padding: 30px;
  max-width: 520px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

header {
  margin-bottom: 20px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #000;
  color: #FAFAFA;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 28px;
  margin: 0 auto 10px;
}

h1 {
  margin: 5px 0;
  letter-spacing: 1px;
}

p {
  margin: 0;
  color: #777;
  font-size: 14px;
}

.divider {
  width: 60px;
  height: 3px;
  background: black;
  margin: 20px auto;
  border-radius: 10px;
}

h2 {
  font-size: 16px;
  margin-bottom: 10px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  margin: 8px 0;
  padding: 8px;
  border-radius: 10px;
  background: #f2f2f2;
  font-size: 14px;
}

a {
  display: inline-block;
  margin-top: 25px;
  padding: 10px 20px;
  text-decoration: none;
  color: black;
  border: 1px solid black;
  border-radius: 25px;
  transition: 0.3s;
}

a:hover {
  background-color: black;
  color: #FAFAFA;
}

footer {
  margin-top: 30px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="avatar">LS</div>
    <h1>LUIS SETH V. RAMOS</h1>
    <p>BSIT-1B</p>
  </header>

  <div class="divider"></div>

  <main>
    <h2>My Hobbies</h2>
    <ul>
      <li>Film Editing</li>
      <li>Videography</li>
      <li>Gaming</li>
    </ul>

    <a href="https://github.com/sethie01/sethie01.github.io"><b>Open GitHub</b></a>
  </main>

  <footer>
    <p>Mariano Marcos State University</p>
  </footer>
</div>

</body>
</html>
